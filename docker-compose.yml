# Docker Compose for motea standalone deployment
# Based on the open-source project Notea, originally created by qingwei-li<cinwell.li@gmail.com>
# Modified and maintained by waycaan, 2025.

version: '3.8'

services:
  motea:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDTIME: ${BUILDTIME:-}
        VERSION: ${VERSION:-latest}
        REVISION: ${REVISION:-}
    container_name: motea
    ports:
      - "3000:3000"
    environment:
      # Basic configuration
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1

      # Database (embedded PostgreSQL)
      - DATABASE_URL=postgresql://motea:motea@localhost:5432/motea
      - PGDATA=/data

      # Authentication
      - PASSWORD=${PASSWORD:-motea}
      - DISABLE_PASSWORD=${DISABLE_PASSWORD:-false}

      # Performance
      - PRELOAD_NOTES_COUNT=${PRELOAD_NOTES_COUNT:-10}

    volumes:
      # Persist PostgreSQL data
      - motea_data:/data

      # Configuration file mapping (optional)
      - ./motea.conf:/app/motea.conf:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

volumes:
  motea_data:
    driver: local
