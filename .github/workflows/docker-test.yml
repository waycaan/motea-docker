name: Docker Test

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  docker-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          tags: motea:test-${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image (amd64 only)
        if: matrix.platform == 'linux/amd64'
        run: |
          # Load the image for testing
          docker buildx build \
            --context . \
            --platform linux/amd64 \
            --tag motea:test \
            --load .

          # Test basic functionality
          docker run --rm \
            -e NODE_ENV=production \
            -e DISABLE_PASSWORD=true \
            motea:test \
            node -e "console.log('Image test passed')"

          # Test health check script
          docker run --rm \
            -e NODE_ENV=production \
            motea:test \
            node -e "
              const http = require('http');
              console.log('Health check script test passed');
            "

  security-scan:
    runs-on: ubuntu-latest
    needs: docker-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: motea:scan
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'motea:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
